<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Maestro &#8212; multi-agent event orchestration powered by Gemini">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a14"/>
      <stop offset="1" stop-color="#141026"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d4aff"/>
      <stop offset="1" stop-color="#c13ba8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#6d4aff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6d4aff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="960" cy="140" rx="520" ry="420" fill="url(#glow)"/>

  <!-- Brand mark: rounded tile with equalizer bars -->
  <g transform="translate(96 96)">
    <rect width="120" height="120" rx="26" fill="url(#brand)"/>
    <rect width="120" height="120" rx="26" fill="url(#sheen)"/>
    <g fill="#ffffff" transform="translate(18 18) scale(2.625)">
      <rect x="5"  y="11" width="3" height="10" rx="1.5"/>
      <rect x="10" y="8"  width="3" height="16" rx="1.5"/>
      <rect x="15" y="5"  width="3" height="22" rx="1.5"/>
      <rect x="20" y="8"  width="3" height="16" rx="1.5"/>
      <rect x="25" y="11" width="3" height="10" rx="1.5"/>
    </g>
  </g>

  <text x="240" y="150" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="76" font-weight="700" fill="#ffffff" letter-spacing="-1">Maestro</text>
  <text x="242" y="196" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="24" font-weight="500" fill="#a99cff">multi-agent event orchestration &#183; powered by Gemini</text>

  <text x="96" y="368" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">One brief in.</text>
  <text x="96" y="440" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="58" font-weight="700" letter-spacing="-1" xml:space="preserve"><tspan fill="#ffffff">A live, generative-UI </tspan><tspan fill="#c13ba8">dashboard</tspan><tspan fill="#ffffff"> out.</tspan></text>

  <text x="96" y="510" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="400" fill="#b9b6cc">Five cooperating Gemini agents &#183; zoneless Angular &#183; BYOK &#183; no backend</text>

  <!-- Pill tags -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" font-weight="500">
    <g transform="translate(96 548)">
      <rect width="196" height="46" rx="23" fill="none" stroke="#6d4aff" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="98" y="30" text-anchor="middle" fill="#a99cff">multi-agent</text>
    </g>
    <g transform="translate(312 548)">
      <rect width="212" height="46" rx="23" fill="none" stroke="#6d4aff" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="106" y="30" text-anchor="middle" fill="#a99cff">generative-ui</text>
    </g>
    <g transform="translate(544 548)">
      <rect width="132" height="46" rx="23" fill="none" stroke="#6d4aff" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="66" y="30" text-anchor="middle" fill="#a99cff">angular</text>
    </g>
  </g>
</svg>

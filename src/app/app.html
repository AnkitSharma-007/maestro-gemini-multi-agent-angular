<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" [routerLink]="['/']" aria-label="Maestro home">
      <div class="logo" aria-hidden="true">
        <mat-icon>graphic_eq</mat-icon>
      </div>
      <div class="brand-text">
        <h1>
          <span class="brand-gradient">Maestro</span>
        </h1>
        <p>Multi-agent event orchestration · Gemini</p>
      </div>
    </a>

    <div class="topbar-right">
      <a
        mat-stroked-button
        class="nav-link"
        [routerLink]="['/architect']"
        routerLinkActive="route-current"
        [routerLinkActiveOptions]="{ exact: true }"
        matTooltip="Open the architect workspace"
        matTooltipPosition="below"
      >
        <mat-icon>rocket_launch</mat-icon>
        <span class="nav-link-label">Open Architect</span>
      </a>

      <button
        mat-icon-button
        type="button"
        class="theme-toggle"
        (click)="toggleTheme()"
        [matTooltip]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        matTooltipPosition="below"
        [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      @if (hasKey()) {
        <button
          mat-stroked-button
          type="button"
          class="key-chip key-chip-on"
          (click)="openKeyDialog()"
          matTooltip="Change key or quality mode"
          matTooltipPosition="below"
        >
          <mat-icon class="ok">check_circle</mat-icon>
          <span class="masked">{{ maskedKey() }}</span>
          <span class="mode-pill">{{ modeLabel() }}</span>
        </button>
      } @else {
        <button
          mat-flat-button
          color="primary"
          type="button"
          class="key-chip key-cta"
          (click)="openKeyDialog()"
        >
          <mat-icon>key</mat-icon>
          <span class="key-cta-label">Connect Gemini key</span>
        </button>
      }
    </div>
  </div>
</header>

<router-outlet />

<footer class="footer">
  <span class="footer-brand">
    <mat-icon aria-hidden="true">bolt</mat-icon>
    Agentic UI with Angular · Zoneless · Signals
  </span>
  <span class="footer-sep">·</span>
  <span>Runs entirely in your browser. Your key never leaves the tab.</span>
</footer>

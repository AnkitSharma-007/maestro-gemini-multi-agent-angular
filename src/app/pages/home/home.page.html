@if (!hasKey()) {
  <dea-no-key-empty-state />
} @else {
  <div class="layout-grid" [class.is-active]="hasContent() || isBusy()">
    <div class="cc-col">
      <dea-command-center />
    </div>
    <aside class="ct-col">
      <dea-control-tower />
    </aside>
  </div>

  @if (hasContent() || isBusy()) {
    <section class="dashboard-row">
      <dea-audit-ribbon />
      <dea-generative-renderer />
    </section>
  } @else {
    <section class="dashboard-row dashboard-row-empty">
      <div class="dashboard-empty">
        <div class="empty-illu" aria-hidden="true">
          <mat-icon>dashboard_customize</mat-icon>
        </div>
        <h3>Your dashboard appears here</h3>
        <p>
          Submit a brief above and watch five Gemini agents (Planner, Auditor, and three
          specialists) compose a live, citation-grounded event dashboard in real time.
        </p>
      </div>
    </section>
  }
}

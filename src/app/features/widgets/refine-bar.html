@if (!expanded()) {
  <button
    mat-stroked-button
    type="button"
    class="trigger"
    (click)="expand()"
    [disabled]="disabled()"
    [matTooltip]="triggerTooltip()"
    matTooltipPosition="above"
  >
    @if (inFlight()) {
      <mat-spinner diameter="16" />
    } @else {
      <mat-icon>auto_fix_high</mat-icon>
    }
    <span>Refine</span>
  </button>
} @else {
  <form
    class="expanded"
    (submit)="$event.preventDefault(); apply()"
    (keydown)="onKeyDown($event)"
  >
    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="field">
      <mat-label>Adjustment for this widget</mat-label>
      <input
        #draftInput
        matInput
        type="text"
        [formField]="draftField"
        autocomplete="off"
        placeholder="e.g. shrink the venue line item by 30%"
        [attr.aria-label]="'Adjustment for ' + widgetId() + ' widget'"
      />
    </mat-form-field>
    <div class="actions">
      <button
        mat-button
        type="button"
        (click)="collapse()"
      >
        Cancel
      </button>
      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="!draft().trim() || disabled()"
      >
        Apply
      </button>
    </div>
  </form>
}

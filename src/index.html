<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Maestro — Multi-agent event planning with Gemini</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Maestro is a generative-UI app where a planner agent conducts an ensemble of Gemini specialists that compose your event dashboard, widget by widget, in real time."
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="mask-icon" href="favicon.svg" color="#b69aff" />
    <meta name="theme-color" content="#0a0a14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f5fb" media="(prefers-color-scheme: light)" />
    <script>
      (function () {
        try {
          var v = localStorage.getItem('dea.theme');
          var light =
            v === 'light' ||
            (!v && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
          if (light) document.documentElement.classList.add('theme-light');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
